# RD-Agent Quant Optimizer Configuration
# ═══════════════════════════════════════

# ──────────────────────────────────────
# Model Routing Strategy
# ──────────────────────────────────────
# Based on architecture analysis of arXiv:2505.15155v2:
# - Synthesis & Analysis: low-frequency, high-impact → strong model
# - Implementation (Co-STEER): high-frequency, self-correcting → efficient model

routing:
  # Which model tier to use for each pipeline stage
  specification: efficient     # Template assembly, minimal LLM needed
  synthesis: strong            # Hypothesis generation, needs creativity
  implementation: efficient    # Code gen + debug, has self-correction loop
  analysis: strong             # Strategy evaluation, needs causal reasoning
  unknown: efficient           # Fallback for unclassified requests

# ──────────────────────────────────────
# Model Definitions
# ──────────────────────────────────────
models:
  strong:
    model_id: "deepseek/deepseek-reasoner"
    input_price_per_m: 0.28      # USD per 1M tokens (cache miss)
    cache_price_per_m: 0.028     # USD per 1M tokens (cache hit)
    output_price_per_m: 0.42     # USD per 1M tokens
    max_tokens: 8192
    temperature: 1.0
    
  efficient:
    model_id: "deepseek/deepseek-chat"
    input_price_per_m: 0.28
    cache_price_per_m: 0.028
    output_price_per_m: 0.42
    max_tokens: 4096
    temperature: 0.8
    
  premium:
    # Only used if you want maximum quality for Synthesis/Analysis
    model_id: "anthropic/claude-sonnet-4-20250514"
    input_price_per_m: 3.0
    cache_price_per_m: 0.30
    output_price_per_m: 15.0
    max_tokens: 4096
    temperature: 0.7

# ──────────────────────────────────────
# Preset Profiles
# ──────────────────────────────────────
profiles:
  # Profile A: Maximum cost efficiency (default)
  # ~$0.5-1.5 for 30 iterations
  budget:
    synthesis: efficient
    implementation: efficient
    analysis: efficient
    
  # Profile B: Optimized (strong where it matters)
  # ~$1.5-3.0 for 30 iterations
  optimized:
    synthesis: strong
    implementation: efficient
    analysis: strong
    
  # Profile C: Premium quality
  # ~$10-20 for 30 iterations
  premium:
    synthesis: premium
    implementation: efficient
    analysis: premium

# ──────────────────────────────────────
# Cost Controls
# ──────────────────────────────────────
cost:
  daily_budget_usd: 5.0        # Auto-downgrade to efficient when exceeded
  alert_threshold_pct: 80      # Warn at 80% of daily budget
  log_file: "logs/cost_log.json"

# ──────────────────────────────────────
# Cache Optimization
# ──────────────────────────────────────
cache:
  enabled: true
  # DeepSeek auto-caches matching prefixes for 5-10 min
  # Strategy: keep system prompt + history prefix consistent
  optimize_message_order: true

# ──────────────────────────────────────
# RD-Agent Integration
# ──────────────────────────────────────
rdagent:
  # Scenario: Qlib factor mining on CSI 300
  scenario: "fin_factor"
  
  # Co-STEER settings (from paper)
  costeer:
    max_debug_iterations: 10    # Inner loop cap
    max_task_runtime_sec: 600   # Per-task timeout
    max_backtest_runtime_sec: 3600
    
  # Iteration settings
  iterations: 30                # Total R&D loops
  
  # Qlib backtesting
  qlib:
    market: "csi300"            # or "csi500", "nasdaq100"
    train_start: "2008-01-01"
    train_end: "2014-12-31"
    valid_start: "2015-01-01"
    valid_end: "2016-12-31"
    test_start: "2017-01-01"
    test_end: "2020-08-01"
    base_model: "LightGBM"      # Fixed model for R&D-Factor mode
    init_factors: "alpha20"     # Starting factor set
